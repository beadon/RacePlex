<!doctype html>
<!-- data-palette is the default colour palette, applied before first paint so the
     app is branded with no flash. App.tsx corrects it from the saved settings on
     mount (same pattern as the `dark` class); see src/lib/palettes.ts. -->
<html lang="en" data-palette="raceplex">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RacePlex — Lap Timing &amp; Telemetry for Electric Skateboards</title>
    <meta name="description" content="Open-source lap timing and telemetry analysis for electric skateboards. Import RaceBox, Dragy, RaceChrono, GPX, NMEA and VBO logs — speed-coloured track maps, lap and sector times, optimal lap. Runs entirely offline in your browser: no account, no upload.">
    <!-- No canonical/verification tags: RacePlex has no deployed domain of its own yet. The
         upstream project's (lapwingdata.com) were removed rather than inherited — pointing our
         canonical URL and Search Console verification at someone else's live site would be wrong. -->

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0C0C0E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RacePlex" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta property="og:title" content="RacePlex — Lap Timing &amp; Telemetry for Electric Skateboards">
    <meta name="twitter:title" content="RacePlex — Lap Timing &amp; Telemetry for Electric Skateboards">
    <meta property="og:description" content="Open-source lap timing and telemetry analysis for electric skateboards. Import RaceBox, Dragy, RaceChrono, GPX, NMEA and VBO logs. Runs entirely offline in your browser.">
    <meta name="twitter:description" content="Open-source lap timing and telemetry analysis for electric skateboards. Import RaceBox, Dragy, RaceChrono, GPX, NMEA and VBO logs. Runs entirely offline in your browser.">

    <meta property="og:image" content="/web-logo.png">
    <meta name="twitter:image" content="/web-logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:type" content="website">
</head>

  <body>
    <!-- Rename any legacy `dove-*` localStorage keys to `raceplex:*` BEFORE any
         ESM module runs — settings, i18n, and the palette all read localStorage
         synchronously at import time, and they need to find the settings blob
         under its new name on the first upgraded boot. Idempotent; no-ops after
         the first run. The IDB rename runs later inside main.tsx. -->
    <script>
      (function migrateLegacyLocalStorage() {
        try {
          var renames = [
            ["dove-dataviewer-settings", "raceplex:settings"],
            ["dove-pending-checkout", "raceplex:pending-checkout"],
            ["dove:setup-revisions:lastPrune", "raceplex:setup-revisions:lastPrune"]
          ];
          for (var i = 0; i < renames.length; i++) {
            var legacy = renames[i][0], next = renames[i][1];
            var val = localStorage.getItem(legacy);
            if (val === null) continue;
            if (localStorage.getItem(next) === null) localStorage.setItem(next, val);
            localStorage.removeItem(legacy);
          }
        } catch (_) { /* storage disabled or private-browsing — carry on */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
