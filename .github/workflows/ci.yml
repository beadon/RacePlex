name: CI

# Runs typecheck + tests + build on every PR and every push to main.
# Lint is intentionally NOT in this workflow yet — the codebase has 100
# pre-existing lint problems (76 errors, 24 warnings) and adding `npm run
# lint` here would make CI red from day one. Fix those in a follow-up PR,
# then add the lint step.

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs when a new commit is pushed to the same ref.
# Saves Actions minutes on rapid-fire pushes to a PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run

      # The build needs VITE_* env vars resolved at build time, including the
      # Supabase URL which the auth context references at app startup. The real
      # .env isn't checked in (per the .env.example convention); a stub built
      # from .env.example is enough for the build to succeed — the production
      # bundle is deployed elsewhere with real values injected.
      - name: Stub .env for build
        run: cp .env.example .env

      - name: Build
        run: npm run build
