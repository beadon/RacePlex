name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# pull-requests: write  -> post/update the per-PR coverage summary comment
#
# There is no coverage badge. Upstream pushed one to a GitHub Gist, which needs a
# GIST_TOKEN secret + COVERAGE_GIST_ID variable that this fork has never had — so
# it failed every push to main, for a picture the README never displayed. The gate
# below is what actually protects the code; a badge is only a social signal.
permissions:
  pull-requests: write

jobs:
  coverage:
    name: Vitest line coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Run coverage with gate
        # Fails the job if line coverage drops below the threshold set in
        # vitest.config.ts (currently 1%). Raise it as coverage grows.
        run: bun run test:coverage

      # ---- Per-PR coverage summary comment (first-party only) ----
      - name: Generate coverage summary
        if: github.event_name == 'pull_request'
        run: bun run coverage:summary

      - name: Post coverage summary comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-summary -->';
            let report;
            try {
              report = fs.readFileSync('coverage/coverage-summary.md', 'utf8');
            } catch (e) {
              core.warning('No coverage-summary.md found; skipping comment.');
              return;
            }
            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
              const existing = comments.data.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } catch (e) {
              // Fork PRs get a read-only token and can't comment — warn, don't fail.
              core.warning(`Could not post coverage comment: ${e.message}`);
            }
