name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# contents: write       -> publish the badge JSON to the `badges` branch (main only)
# pull-requests: write  -> post/update the per-PR coverage summary comment
permissions:
  contents: write
  pull-requests: write

jobs:
  coverage:
    name: Vitest line coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Run coverage with gate
        # Fails the job if line coverage drops below the threshold set in
        # vitest.config.ts (currently 1%). Raise it as coverage grows.
        run: npm run test:coverage

      # ---- Per-PR coverage summary comment (first-party only) ----
      - name: Generate coverage summary
        if: github.event_name == 'pull_request'
        run: npm run coverage:summary

      - name: Post coverage summary comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-summary -->';
            let report;
            try {
              report = fs.readFileSync('coverage/coverage-summary.md', 'utf8');
            } catch (e) {
              core.warning('No coverage-summary.md found; skipping comment.');
              return;
            }
            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
              const existing = comments.data.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } catch (e) {
              // Fork PRs get a read-only token and can't comment — warn, don't fail.
              core.warning(`Could not post coverage comment: ${e.message}`);
            }

      # ---- Live % badge: publish shields.io endpoint JSON to `badges` branch ----
      - name: Generate badge JSON
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: npm run coverage:badge

      - name: Stage badge for publish
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p badge-publish
          cp coverage/coverage-badge.json badge-publish/

      - name: Publish badge to the `badges` branch
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: badges
          publish_dir: ./badge-publish
          force_orphan: true
